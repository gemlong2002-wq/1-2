<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOS Ledger // Aegis Core V8.7</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-base: #f0f4f8;
      --glass-border: rgba(255, 255, 255, 0.8);
      --glass-highlight: rgba(255, 255, 255, 0.95);
      --accent-glow: rgba(56, 189, 248, 0.15);
    }
    body {
      background-color: var(--bg-base);
      background-image: 
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.8) 0%, transparent 50%);
      font-family: 'Inter', sans-serif;
      color: #0f172a;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* 背景極光球體動畫 */
    .aurora-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      z-index: -1;
      animation: floatOrb 20s ease-in-out infinite alternate;
      opacity: 0.65;
      mix-blend-mode: multiply;
    }
    .orb-1 { top: -15%; left: -5%; width: 45vw; height: 45vw; background: #bae6fd; }
    .orb-2 { bottom: -10%; right: -10%; width: 55vw; height: 55vw; background: #e8dbfa; animation-delay: -7s; }
    .orb-3 { top: 30%; left: 40%; width: 35vw; height: 35vw; background: #fdf4ff; animation-delay: -14s; }

    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      50% { transform: translate(6%, 8%) scale(1.08) rotate(5deg); }
      100% { transform: translate(-4%, -6%) scale(0.92) rotate(-5deg); }
    }

    /* Aegis 主機殼 (大區塊懸浮) */
    .aegis-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid var(--glass-border);
      box-shadow: 
        0 8px 32px -8px rgba(15, 23, 42, 0.06),
        inset 0 1px 1px var(--glass-highlight);
      border-radius: 28px;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .hover-lift {
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border-color 0.4s ease;
    }
    .hover-lift:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 
        0 20px 40px -10px rgba(15, 23, 42, 0.12),
        0 10px 20px -5px rgba(15, 23, 42, 0.04),
        0 0 0 1px var(--accent-glow);
      border-color: rgba(255, 255, 255, 1);
      z-index: 10;
    }

    /* 🚀 核心升級：內部微型區塊懸浮與發光 (Micro-interactions) 🚀 */
    .hover-micro-lift {
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border-color 0.4s ease;
    }
    .hover-micro-lift:hover {
      transform: translateY(-4px) scale(1.025);
      box-shadow: 
        0 14px 28px -8px rgba(56, 189, 248, 0.3), /* 淡藍色光暈特效 */
        0 4px 12px -4px rgba(15, 23, 42, 0.08),
        inset 0 1px 1px rgba(255, 255, 255, 1);
      border-color: rgba(125, 211, 252, 0.6) !important; /* 邊框泛起藍色光澤 */
      z-index: 20;
    }
    
    /* 點擊下壓回饋 */
    .active-press:active {
      transform: translateY(2px) scale(0.98) !important;
      box-shadow: 0 4px 10px -4px rgba(15, 23, 42, 0.1) !important;
    }

    .font-mono { font-family: 'JetBrains Mono', monospace; }
    
    .input-neumorphic {
      background: rgba(248, 250, 252, 0.8);
      box-shadow: inset 0 2px 4px rgba(15, 23, 42, 0.03);
      border: 1px solid rgba(226, 232, 240, 0.8);
      transition: all 0.3s ease;
    }
    .input-neumorphic:focus {
      background: #ffffff;
      box-shadow: 
        0 0 0 4px rgba(224, 242, 254, 0.8), /* Focus時也有淡淡藍色 */
        inset 0 0 0 1px rgba(125, 211, 252, 0.2);
      border-color: rgba(186, 230, 253, 1);
    }

    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="antialiased selection:bg-sky-100 selection:text-sky-900 pb-32">
  <div class="aurora-orb orb-1"></div>
  <div class="aurora-orb orb-2"></div>
  <div class="aurora-orb orb-3"></div>
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyOA5zlzlwyKVNPFG5EQmoFqileorfxJ2XZ6ETrW4xzK18AXE40KW3VavqqhFaxolbD/exec';

    const formatSafeDate = (rawDate) => {
      if (!rawDate) return "無日期";
      const dObj = new Date(rawDate);
      if (!isNaN(dObj.getTime())) {
        const yyyy = dObj.getFullYear();
        const mm = String(dObj.getMonth() + 1).padStart(2, '0');
        const dd = String(dObj.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
      }
      return String(rawDate).substring(0, 10);
    };

    const App = () => {
      const [records, setRecords] = useState([]);
      const [totalRecords, setTotalRecords] = useState(0);
      const [globalStats, setGlobalStats] = useState({ bPaid: 0, sPaid: 0, sDebt: 0, bDebt: 0, count: 0, balance: 0, sharedPerPerson: 0 });
      
      const [isLoading, setIsLoading] = useState(true);
      const [isLoadMoreLoading, setIsLoadMoreLoading] = useState(false);
      
      const [alertData, setAlertData] = useState(null);
      const [editModal, setEditModal] = useState({ isOpen: false, data: null });
      
      const [calcOpen, setCalcOpen] = useState(false);
      const [isCalcMinimized, setIsCalcMinimized] = useState(false);
      const [calcStr, setCalcStr] = useState('');
      
      const [filterPanelOpen, setFilterPanelOpen] = useState(false);
      const [isFilterMinimized, setIsFilterMinimized] = useState(false);
      const [isFiltering, setIsFiltering] = useState(false);
      const [filterDates, setFilterDates] = useState({ start: '', end: '' });

      const [expandedGroups, setExpandedGroups] = useState({ 'current': true });

      const [inputs, setInputs] = useState({
        date: formatSafeDate(new Date()),
        item: '', amount: '', payer: 'brother', type: 'shared', note: ''
      });

      const fetchInitialData = async () => {
        setIsLoading(true);
        try {
          const res = await fetch(`${GAS_URL}?action=initial`);
          const payload = await res.json();
          const cleanRecords = payload.records.map(r => ({...r, date: formatSafeDate(r.date)}));
          setRecords(cleanRecords);
          setTotalRecords(payload.totalRecords);
          setGlobalStats(payload.stats);
          setIsFiltering(false);
        } catch(e) {
          triggerAlert('API 拒絕連線', 'FETCH ERROR', '無法與後端節點建立通訊。', e.toString());
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => {
        fetchInitialData();
      }, []);

      const fetchMoreRecords = async () => {
        setIsLoadMoreLoading(true);
        try {
          const res = await fetch(`${GAS_URL}?action=loadMore&offset=${records.length}`);
          const payload = await res.json();
          setRecords(prev => {
             const cleanMore = payload.records.map(r => ({...r, date: formatSafeDate(r.date)}));
             const combined = [...prev, ...cleanMore];
             combined.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime() || b.timestamp - a.timestamp);
             return combined;
          });
        } catch(e) {
          console.error(e);
        } finally {
          setIsLoadMoreLoading(false);
        }
      };

      const executeFilter = async () => {
        if (!filterDates.start && !filterDates.end) {
          triggerAlert('參數不足', 'MISSING PARAMETERS', '請至少設定一個時間節點。', 'Temporal filter requires start or end boundary.');
          return;
        }
        setIsLoading(true);
        try {
          const res = await fetch(`${GAS_URL}?action=filter&start=${filterDates.start}&end=${filterDates.end}`);
          const payload = await res.json();
          const cleanRecords = payload.records.map(r => ({...r, date: formatSafeDate(r.date)}));
          setRecords(cleanRecords);
          setGlobalStats(payload.stats);
          setIsFiltering(true);
          setIsFilterMinimized(true); 
        } catch(e) {
          console.error(e);
        } finally {
          setIsLoading(false);
        }
      };

      const clearFilter = () => {
        setFilterDates({ start: '', end: '' });
        fetchInitialData();
      };

      const triggerAlert = (title, enTitle, desc, enDesc) => { setAlertData({ title, enTitle, desc, enDesc }); };

      const executeSave = async (recordToSave, isEdit = false) => {
        const safeRecord = { ...recordToSave, date: formatSafeDate(recordToSave.date) };
        
        if (isEdit) {
          setRecords(prev => {
            const arr = prev.map(r => r.id === safeRecord.id ? safeRecord : r);
            arr.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime() || b.timestamp - a.timestamp);
            return arr;
          });
          setEditModal({ isOpen: false, data: null });
        } else {
          setRecords(prev => {
            const arr = [safeRecord, ...prev];
            arr.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime() || b.timestamp - a.timestamp);
            return arr;
          });
          setTotalRecords(prev => prev + 1);
          setInputs(prev => ({ ...prev, item: '', amount: '', note: '' }));
        }

        try {
          await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: isEdit ? 'edit' : 'add',
              data: safeRecord
            })
          });
        } catch(e) {
          console.error("寫入失敗 Sync failed", e);
        }
      };

      const deleteRecord = async (id, e) => {
        if (e) e.stopPropagation();
        if(!confirm('確認將此紀錄從資料庫永久抹除？\nCONFIRM DATA ERADICATION?')) return;
        
        setRecords(prev => prev.filter(r => r.id !== id));
        if (!isFiltering) setTotalRecords(prev => prev - 1);
        if (editModal.isOpen) setEditModal({ isOpen: false, data: null });

        try {
          await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'delete', id: id })
          });
        } catch(e) {
          console.error("刪除失敗", e);
        }
      };

      const liveStats = useMemo(() => {
        if (isFiltering) { return { ...globalStats, isPartial: false }; }
        let bPaid = 0, sPaid = 0, sDebt = 0, bDebt = 0, cycleCount = 0;
        let milestoneFound = false;
        
        for (let r of records) {
          if (r.type === 'milestone') { milestoneFound = true; break; }
          cycleCount++;
          if (r.type === 'shared') {
            if (r.payer === 'brother') bPaid += r.amount; else sPaid += r.amount;
          } else if (r.type === 'sister_debt' || r.type === 'debt') {
            if (r.payer === 'brother') sDebt += r.amount; 
          } else if (r.type === 'brother_debt') {
            if (r.payer === 'sister') bDebt += r.amount; 
          }
        }
        const sharedPerPerson = (bPaid + sPaid) / 2;
        const brotherNet = (bPaid - sharedPerPerson) + sDebt - bDebt; 
        const useGlobal = !milestoneFound && records.length < totalRecords;
        
        return { 
          bPaid: useGlobal ? globalStats.bPaid : bPaid,
          sPaid: useGlobal ? globalStats.sPaid : sPaid,
          sDebt: useGlobal ? globalStats.sDebt : sDebt,
          bDebt: useGlobal ? globalStats.bDebt : bDebt,
          sharedPerPerson: useGlobal ? globalStats.sharedPerPerson : sharedPerPerson,
          balance: useGlobal ? globalStats.balance : brotherNet,
          count: useGlobal ? globalStats.count : cycleCount,
          isPartial: useGlobal 
        };
      }, [records, totalRecords, globalStats, isFiltering]);

      const groupedRecords = useMemo(() => {
        if (isFiltering) { return [{ milestone: null, records: records, id: 'filtered' }]; }
        const groups = [];
        let currentGroup = { milestone: null, records: [], id: 'current' };
        records.forEach(r => {
          if (r.type === 'milestone') {
            if (currentGroup.records.length > 0 || currentGroup.id === 'current') { groups.push(currentGroup); }
            currentGroup = { milestone: r, records: [], id: r.id };
          } else { currentGroup.records.push(r); }
        });
        if (currentGroup.records.length > 0 || currentGroup.milestone) { groups.push(currentGroup); }
        return groups;
      }, [records, isFiltering]);

      const toggleGroup = (id) => { setExpandedGroups(prev => ({ ...prev, [id]: !prev[id] })); };

      const handleSubmit = (e) => {
        if (e) e.preventDefault();
        if (!inputs.item || !inputs.amount) return;

        if (inputs.payer === 'brother' && inputs.type === 'brother_debt') {
          triggerAlert('邏輯衝突', 'LOGIC ERROR', '你用自己的卡買自己的東西，不需進入系統核心。', 'Self-funded items bypass the core ledger.');
          return;
        }
        if (inputs.payer === 'sister' && inputs.type === 'sister_debt') {
          triggerAlert('邏輯衝突', 'LOGIC ERROR', '妹妹用自己的卡買自己的東西，不需進入系統核心。', 'Self-funded items bypass the core ledger.');
          return;
        }
        const newRecord = { ...inputs, id: Date.now().toString(), amount: parseFloat(inputs.amount), timestamp: Date.now() };
        executeSave(newRecord, false);
      };

      const addMilestone = () => {
        const newM = { id: Date.now().toString(), date: inputs.date, item: '結算斷點 MILESTONE', amount: 0, payer: 'system', type: 'milestone', note: '', timestamp: Date.now() };
        executeSave(newM, false);
      };

      const handleEditSubmit = (e) => {
        e.preventDefault();
        executeSave(editModal.data, true);
      };

      const calcEval = () => { try { setCalcStr(eval(calcStr).toString()); } catch(e) { setCalcStr('ERR'); } };

      if (isLoading) return (
        <div className="fixed inset-0 bg-white/60 backdrop-blur-xl z-[9999] flex flex-col items-center justify-center">
          <div className="relative w-24 h-24">
            <div className="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
            <div className="absolute inset-0 border-4 border-slate-900 rounded-full border-t-transparent animate-[spin_1.5s_linear_infinite]"></div>
            <div className="absolute inset-4 border-4 border-sky-400 rounded-full border-b-transparent animate-[spin_2s_linear_infinite_reverse]"></div>
          </div>
          <div className="mt-10 text-xs tracking-[0.4em] text-slate-800 font-bold bg-white/80 px-6 py-2.5 rounded-full border border-sky-100 shadow-[0_0_15px_rgba(56,189,248,0.2)] backdrop-blur-sm">
            INITIALIZING AEGIS V8.7
          </div>
        </div>
      );

      return (
        <div className="p-4 md:p-8 max-w-[1400px] mx-auto space-y-8 relative z-10">
          
          <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 pb-4">
            <div className="pt-4">
              <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight text-slate-900 flex items-center gap-4">
                林林家的記帳本
                <span className="text-xs px-3 py-1 bg-white/80 backdrop-blur-sm border border-slate-200 text-slate-500 rounded-full font-mono shadow-sm tracking-wider">V8.7 Micro-Glow</span>
              </h1>
              <p className="text-[13px] font-semibold text-slate-400 mt-4 tracking-[0.2em] uppercase flex items-center gap-2">
                FOS LEDGER // AEGIS CORE ARCHITECTURE
              </p>
            </div>
            <div className="flex flex-wrap gap-3 w-full md:w-auto">
              <button onClick={() => { setFilterPanelOpen(true); setIsFilterMinimized(false); }} className="active-press flex-1 md:flex-none px-6 py-3.5 bg-white/80 backdrop-blur-md text-slate-600 rounded-2xl border border-slate-200 hover:bg-white transition-all shadow-sm flex items-center justify-center gap-2 text-sm font-bold tracking-widest hover-micro-lift group/btn">
                <span className="transition-transform duration-300 group-hover/btn:scale-110 group-hover/btn:text-sky-600">⏳ 空間濾鏡 FILTER</span>
              </button>
              <button onClick={() => { setCalcOpen(true); setIsCalcMinimized(false); }} className="active-press flex-1 md:flex-none px-6 py-3.5 bg-white/80 backdrop-blur-md text-slate-600 rounded-2xl border border-slate-200 hover:bg-white transition-all shadow-sm flex items-center justify-center gap-2 text-sm font-bold tracking-widest hover-micro-lift group/btn">
                <span className="transition-transform duration-300 group-hover/btn:scale-110 group-hover/btn:text-sky-600">🧮 計算機 CALC</span>
              </button>
            </div>
          </div>

          <div className="grid grid-cols-1 xl:grid-cols-12 gap-8">
            
            <div className="xl:col-span-5 space-y-6">
              
              <div className="aegis-panel p-8 md:p-10 hover-lift group">
                <div className="flex justify-between items-start mb-10">
                  <h2 className="text-xl md:text-2xl font-bold text-slate-800 flex flex-col gap-1 transition-transform duration-300 origin-left group-hover:scale-105">
                    {isFiltering ? '檢索區間結算' : '當前週期結算'}
                    <span className="text-[10px] font-mono text-slate-400 tracking-[0.15em] uppercase">{isFiltering ? 'Filtered Matrix' : 'Live Sync Matrix'}</span>
                  </h2>
                  <div className={`text-[10px] font-mono px-3 py-1.5 rounded-full border shadow-sm ${isFiltering ? 'border-sky-200 bg-sky-50 text-sky-600' : 'border-slate-200 bg-white text-slate-500'}`}>
                    {isFiltering ? '● FILTER ACTIVE' : '● ONLINE'}
                  </div>
                </div>
                
                {liveStats.isPartial && !isFiltering && (
                  <div className="text-xs text-slate-500 mb-6 bg-white/60 backdrop-blur-sm px-4 py-2.5 rounded-xl border border-slate-100 flex items-center gap-2 shadow-sm font-mono hover-micro-lift">
                    <span className="animate-pulse w-2 h-2 bg-amber-400 rounded-full inline-block"></span> REBUILDING GLOBAL CACHE
                  </div>
                )}

                <div className="flex flex-col items-center justify-center py-12 bg-white/90 backdrop-blur-md rounded-[2rem] border border-slate-100 shadow-[0_10px_40px_rgb(15,23,42,0.04)] relative overflow-hidden transition-transform duration-500 hover-micro-lift group/main">
                  <div className="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-slate-200 to-transparent"></div>
                  {liveStats.balance > 0 ? (
                    <div className="text-center w-full px-4">
                      <div className="text-xs font-bold text-slate-400 mb-4 tracking-[0.25em] transition-transform duration-300 group-hover/main:scale-105 group-hover/main:text-sky-500">妹妹 ➔ 哥哥</div>
                      <div className="text-5xl md:text-7xl font-bold tracking-tighter text-slate-800 drop-shadow-sm font-mono transition-transform duration-300 group-hover/main:scale-110 group-hover/main:text-slate-900">$ {liveStats.balance.toLocaleString()}</div>
                    </div>
                  ) : liveStats.balance < 0 ? (
                    <div className="text-center w-full px-4">
                      <div className="text-xs font-bold text-slate-400 mb-4 tracking-[0.25em] transition-transform duration-300 group-hover/main:scale-105 group-hover/main:text-sky-500">哥哥 ➔ 妹妹</div>
                      <div className="text-5xl md:text-7xl font-bold tracking-tighter text-slate-800 drop-shadow-sm font-mono transition-transform duration-300 group-hover/main:scale-110 group-hover/main:text-slate-900">$ {Math.abs(liveStats.balance).toLocaleString()}</div>
                    </div>
                  ) : (
                    <div className="text-center w-full px-4 py-6">
                      <div className="text-3xl font-bold text-emerald-400 tracking-[0.25em] transition-transform duration-300 group-hover/main:scale-110">系統結清</div>
                      <div className="text-xs font-mono text-slate-400 mt-3 transition-transform duration-300 group-hover/main:scale-105">CLEARED</div>
                    </div>
                  )}
                </div>

                {/* 內部小區塊：加入 hover-micro-lift 與文字放大特效 */}
                <div className="mt-8 grid grid-cols-2 gap-5">
                  <div className="bg-white/80 backdrop-blur-md p-5 md:p-6 rounded-3xl border border-slate-100 shadow-sm relative hover-micro-lift group/micro">
                    <div className="text-[11px] font-bold text-slate-400 mb-3 tracking-widest transition-transform duration-300 origin-left group-hover/micro:scale-105 group-hover/micro:text-sky-500">公費均攤 SHARED</div>
                    <div className="text-xl md:text-2xl font-bold text-slate-700 font-mono transition-transform duration-300 origin-left group-hover/micro:scale-110 group-hover/micro:text-slate-900">$ {liveStats.sharedPerPerson.toLocaleString()}</div>
                  </div>
                  <div className="bg-white/80 backdrop-blur-md p-5 md:p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col justify-center relative hover-micro-lift group/micro">
                    <div className="text-[11px] font-bold text-slate-400 mb-3 tracking-widest transition-transform duration-300 origin-left group-hover/micro:scale-105 group-hover/micro:text-sky-500">墊付 DEBT</div>
                    <div className="text-sm font-semibold text-slate-600 flex justify-between font-mono transition-transform duration-300 origin-left group-hover/micro:scale-[1.08]"><span className="group-hover/micro:text-slate-900">妹:</span> <span>${liveStats.sDebt.toLocaleString()}</span></div>
                    <div className="text-sm font-semibold text-slate-600 flex justify-between mt-2 font-mono transition-transform duration-300 origin-left group-hover/micro:scale-[1.08]"><span className="group-hover/micro:text-slate-900">哥:</span> <span>${liveStats.bDebt.toLocaleString()}</span></div>
                  </div>
                </div>
              </div>

              <form onSubmit={handleSubmit} className="aegis-panel p-8 md:p-10 space-y-8 relative overflow-hidden hover-lift group">
                <div className="flex justify-between items-center pb-2">
                  <h2 className="text-xl font-bold text-slate-800 transition-transform duration-300 origin-left group-hover:scale-105">寫入核心 <span className="text-[10px] font-mono text-slate-400 ml-2 uppercase tracking-widest">Input Engine</span></h2>
                </div>

                <div className="space-y-4">
                  <label className="text-[11px] font-bold text-slate-500 tracking-widest">支付端點 SOURCE</label>
                  <div className="grid grid-cols-2 gap-4">
                    {/* 輸入按鈕：加入 hover-micro-lift */}
                    <button type="button" className={`active-press py-4 md:py-5 rounded-2xl border transition-all flex flex-col items-center justify-center gap-1.5 hover-micro-lift group/btn ${inputs.payer==='brother'?'bg-slate-900 text-white border-slate-900 shadow-[0_10px_25px_rgb(15,23,42,0.2)]':'bg-white/90 text-slate-500 border-slate-200'}`} onClick={()=>setInputs({...inputs, payer:'brother'})}>
                      <span className="text-2xl mb-1 transition-transform duration-300 group-hover/btn:scale-125 group-hover/btn:rotate-[-5deg]">💰</span><span className="font-bold text-sm tracking-wide transition-transform duration-300 group-hover/btn:scale-110">哥哥</span>
                    </button>
                    <button type="button" className={`active-press py-4 md:py-5 rounded-2xl border transition-all flex flex-col items-center justify-center gap-1.5 hover-micro-lift group/btn ${inputs.payer==='sister'?'bg-slate-900 text-white border-slate-900 shadow-[0_10px_25px_rgb(15,23,42,0.2)]':'bg-white/90 text-slate-500 border-slate-200'}`} onClick={()=>setInputs({...inputs, payer:'sister'})}>
                      <span className="text-2xl mb-1 transition-transform duration-300 group-hover/btn:scale-125 group-hover/btn:rotate-[5deg]">☔</span><span className="font-bold text-sm tracking-wide transition-transform duration-300 group-hover/btn:scale-110">妹妹</span>
                    </button>
                  </div>
                </div>

                <div className="space-y-4">
                  <label className="text-[11px] font-bold text-slate-500 tracking-widest">屬性 TYPE</label>
                  <div className="grid grid-cols-3 gap-3 md:gap-4">
                    <button type="button" className={`active-press py-3 md:py-4 rounded-2xl border transition-all flex flex-col items-center justify-center gap-2 hover-micro-lift group/btn ${inputs.type==='shared'?'bg-white text-slate-900 border-sky-300 shadow-[0_8px_20px_rgba(56,189,248,0.2)] ring-1 ring-sky-100':'bg-white/80 text-slate-400 border-slate-100'}`} onClick={()=>setInputs({...inputs, type:'shared'})}>
                      <span className="text-xl md:text-2xl transition-transform duration-300 group-hover/btn:scale-125">🤝</span><span className="font-bold text-xs tracking-wide transition-transform duration-300 group-hover/btn:scale-110">公積金</span>
                    </button>
                    <button type="button" className={`active-press py-3 md:py-4 rounded-2xl border transition-all flex flex-col items-center justify-center gap-2 hover-micro-lift group/btn ${inputs.type==='sister_debt'?'bg-white text-slate-900 border-sky-300 shadow-[0_8px_20px_rgba(56,189,248,0.2)] ring-1 ring-sky-100':'bg-white/80 text-slate-400 border-slate-100'}`} onClick={()=>setInputs({...inputs, type:'sister_debt'})}>
                      <span className="text-xl md:text-2xl transition-transform duration-300 group-hover/btn:scale-125">🏠</span><span className="font-bold text-xs tracking-wide transition-transform duration-300 group-hover/btn:scale-110">妹私用</span>
                    </button>
                    <button type="button" className={`active-press py-3 md:py-4 rounded-2xl border transition-all flex flex-col items-center justify-center gap-2 hover-micro-lift group/btn ${inputs.type==='brother_debt'?'bg-white text-slate-900 border-sky-300 shadow-[0_8px_20px_rgba(56,189,248,0.2)] ring-1 ring-sky-100':'bg-white/80 text-slate-400 border-slate-100'}`} onClick={()=>setInputs({...inputs, type:'brother_debt'})}>
                      <span className="text-xl md:text-2xl transition-transform duration-300 group-hover/btn:scale-125">🏚️</span><span className="font-bold text-xs tracking-wide transition-transform duration-300 group-hover/btn:scale-110">哥私用</span>
                    </button>
                  </div>
                </div>

                <div className="space-y-5 pt-5 border-t border-slate-100">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                      <label className="text-[10px] font-bold text-slate-400 block mb-2 tracking-widest">日期 DATE</label>
                      <input type="date" value={inputs.date} className="w-full input-neumorphic rounded-xl p-3.5 text-sm text-slate-700 font-mono outline-none" onChange={e=>setInputs({...inputs, date:e.target.value})}/>
                    </div>
                    <div>
                      <label className="text-[10px] font-bold text-slate-400 block mb-2 tracking-widest">金額 AMOUNT</label>
                      <input type="number" value={inputs.amount} placeholder="0" className="w-full input-neumorphic rounded-xl p-3.5 text-xl font-bold font-mono text-slate-900 outline-none" onChange={e=>setInputs({...inputs, amount:e.target.value})}/>
                    </div>
                  </div>
                  <div>
                    <label className="text-[10px] font-bold text-slate-400 block mb-2 tracking-widest">品項 ITEM</label>
                    <input type="text" value={inputs.item} placeholder="Input item name..." className="w-full input-neumorphic rounded-xl p-4 text-base text-slate-800 font-medium outline-none" onChange={e=>setInputs({...inputs, item:e.target.value})}/>
                  </div>
                </div>
                
                <div className="flex gap-4 pt-4">
                  <button type="submit" className="active-press flex-1 bg-slate-900 text-white font-bold tracking-widest rounded-2xl py-4.5 md:py-5 transition-all shadow-[0_8px_20px_rgb(15,23,42,0.2)] hover-micro-lift group/exec border-transparent">
                    <span className="inline-block transition-transform duration-300 group-hover/exec:scale-105 group-hover/exec:text-sky-300">EXECUTE WRITE</span>
                  </button>
                  <button type="button" onClick={addMilestone} className="active-press w-20 md:w-24 bg-white/80 backdrop-blur-sm text-slate-400 rounded-2xl py-4 border border-slate-200 flex items-center justify-center hover-micro-lift group/flag">
                    <span className="text-xl md:text-2xl transition-transform duration-300 group-hover/flag:scale-125">🚩</span>
                  </button>
                </div>
              </form>
            </div>

            <div className="xl:col-span-7 space-y-6">
              
              <div className="aegis-panel p-6 md:p-8 flex justify-between items-center hover-lift group">
                <h2 className="text-xl font-bold text-slate-800 transition-transform duration-300 origin-left group-hover:scale-105">儲存矩陣 <span className="text-[10px] font-mono text-slate-400 uppercase tracking-widest ml-2 hidden sm:inline">Database Archive</span></h2>
                <div className="text-[11px] font-mono text-slate-500 bg-white/90 backdrop-blur-sm px-4 py-2 rounded-full border border-slate-200 shadow-sm transition-transform duration-300 origin-right group-hover:scale-105 group-hover:text-sky-600">
                  {isFiltering ? 'FILTER:' : 'VOL:'} <span className="font-bold text-slate-800 ml-1">{records.length}</span> {isFiltering ? '' : `/ ${totalRecords}`}
                </div>
              </div>

              <div className="space-y-6">
                {groupedRecords.map((group, index) => {
                  const isFilteredMode = group.id === 'filtered';
                  const isCurrentCycle = group.id === 'current';
                  const isExpanded = isFilteredMode ? true : expandedGroups[group.id]; 

                  return (
                    <div key={group.id} className="space-y-4">
                      {!isFilteredMode && isCurrentCycle ? (
                        <div className="bg-white/80 backdrop-blur-md border border-slate-200 rounded-2xl p-5 md:p-6 flex justify-between items-center cursor-pointer shadow-sm hover-micro-lift group/cycle" onClick={() => toggleGroup(group.id)}>
                           <div className="font-bold text-slate-800 tracking-wider flex items-center gap-3 transition-transform duration-300 origin-left group-hover/cycle:scale-105 group-hover/cycle:text-sky-700">
                             <span className="w-2.5 h-2.5 rounded-full bg-emerald-400 shadow-[0_0_10px_rgba(52,211,153,0.8)]"></span> LIVE CYCLE
                           </div>
                           <div className="text-[10px] font-mono font-bold text-slate-400 bg-slate-50 px-3.5 py-1.5 rounded-full border border-slate-100 transition-all duration-300 group-hover/cycle:bg-sky-50 group-hover/cycle:text-sky-600 group-hover/cycle:scale-105 origin-right">{isExpanded ? 'COLLAPSE ▲' : 'EXPAND ▼'}</div>
                        </div>
                      ) : !isFilteredMode && !isCurrentCycle ? (
                        <div className="bg-slate-100/60 backdrop-blur-sm border border-slate-200 rounded-2xl p-5 md:p-6 flex flex-col sm:flex-row justify-between items-start sm:items-center cursor-pointer gap-4 shadow-sm hover-micro-lift group/mile" onClick={() => toggleGroup(group.id)}>
                           <div className="flex-1 transition-transform duration-300 origin-left group-hover/mile:scale-105">
                             <div className="font-bold text-slate-700 flex items-center gap-2 text-sm tracking-widest uppercase group-hover/mile:text-sky-700"><span className="text-xl">🚩</span> Cycle Milestone</div>
                             <div className="font-mono text-slate-500 text-xs mt-2 bg-white inline-block px-2.5 py-1 rounded-md border border-slate-100 shadow-sm">{group.milestone?.date}</div>
                           </div>
                           <div className="flex items-center gap-3 w-full sm:w-auto transition-transform duration-300 origin-right group-hover/mile:scale-[1.03]">
                             <button onClick={(e) => deleteRecord(group.milestone.id, e)} className="active-press px-4 py-2 bg-white text-rose-500 text-[10px] font-bold rounded-lg border border-rose-100 hover:bg-rose-50 shadow-sm transition-all tracking-widest uppercase relative z-10">
                               Erase
                             </button>
                             <div className="text-[10px] font-mono font-bold text-slate-400 bg-white px-3.5 py-1.5 rounded-full border border-slate-100 group-hover/mile:bg-sky-50 group-hover/mile:text-sky-600">{isExpanded ? 'COLLAPSE ▲' : 'EXPAND ▼'}</div>
                           </div>
                        </div>
                      ) : null}

                      {isExpanded && (
                        <div className={`space-y-3.5 ${isFilteredMode ? '' : 'pl-2 sm:pl-8 border-l-2 border-slate-200/80'} animate-[fade-in-up_0.3s_ease-out]`}>
                          {group.records.length === 0 ? (
                            <div className="py-12 bg-white/40 backdrop-blur-sm border-2 border-dashed border-slate-200 rounded-3xl text-center text-slate-400 text-xs font-mono font-bold tracking-widest">NO DATA FOUND</div>
                          ) : (
                            group.records.map((r) => (
                              /* 紀錄卡片小區塊：套用 hover-micro-lift */
                              <div key={r.id} className="bg-white/85 backdrop-blur-md border border-slate-100 rounded-[1.25rem] p-5 md:p-6 flex flex-col sm:flex-row justify-between items-start sm:items-center cursor-pointer hover-micro-lift group/rec" onClick={() => setEditModal({isOpen: true, data: r})}>
                                <div className="flex items-center gap-4 md:gap-5 w-full">
                                  <div className="text-3xl md:text-4xl shrink-0 opacity-70 transition-all duration-400 group-hover/rec:opacity-100 group-hover/rec:scale-125 group-hover/rec:rotate-[-5deg] drop-shadow-sm">{r.payer==='brother'?'💰':'☔'}</div>
                                  <div className="flex-1 min-w-0">
                                    <div className="text-lg md:text-xl font-bold text-slate-800 flex items-center gap-2.5">
                                      <span className="truncate inline-block transition-transform duration-300 origin-left group-hover/rec:scale-[1.08] group-hover/rec:text-sky-800">{r.item}</span>
                                      {r.type==='sister_debt' && <span className="text-[9px] font-bold tracking-wider bg-slate-100 text-slate-500 px-2 py-1 rounded-md border border-slate-200 uppercase shrink-0 shadow-sm transition-transform duration-300 origin-left group-hover/rec:scale-110">妹私</span>}
                                      {r.type==='brother_debt' && <span className="text-[9px] font-bold tracking-wider bg-slate-100 text-slate-500 px-2 py-1 rounded-md border border-slate-200 uppercase shrink-0 shadow-sm transition-transform duration-300 origin-left group-hover/rec:scale-110">哥私</span>}
                                      {r.type==='shared' && <span className="text-[9px] font-bold tracking-wider bg-sky-50 text-sky-600 border border-sky-100 px-2 py-1 rounded-md uppercase shrink-0 shadow-sm transition-transform duration-300 origin-left group-hover/rec:scale-110">🤝 公費</span>}
                                    </div>
                                    <div className="text-[11px] md:text-xs text-slate-400 font-mono mt-2 flex items-center gap-3">
                                      <span className="bg-slate-50 px-2.5 py-1 rounded-md border border-slate-100 transition-transform duration-300 origin-left group-hover/rec:scale-[1.05] group-hover/rec:bg-white">{r.date}</span>
                                      <span className="opacity-0 group-hover/rec:opacity-100 text-sky-500 transition-all duration-300 font-bold tracking-widest bg-sky-50 px-2 py-0.5 rounded-md transform translate-x-[-10px] group-hover/rec:translate-x-0">EDIT_</span>
                                    </div>
                                  </div>
                                </div>
                                <div className="mt-4 sm:mt-0 text-right w-full sm:w-auto shrink-0">
                                  <div className="text-2xl md:text-3xl font-bold text-slate-800 font-mono tracking-tight transition-all duration-300 origin-right group-hover/rec:scale-[1.15] group-hover/rec:text-sky-600 drop-shadow-sm">$ {r.amount.toLocaleString()}</div>
                                </div>
                              </div>
                            ))
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {!isFiltering && records.length < totalRecords && (
                <div className="pt-10 flex justify-center pb-8">
                  <button 
                    onClick={fetchMoreRecords} 
                    disabled={isLoadMoreLoading}
                    className={`active-press bg-white/90 backdrop-blur-sm text-slate-600 text-xs font-bold tracking-[0.15em] border border-slate-200 rounded-full px-8 py-3.5 transition-all uppercase shadow-sm ${isLoadMoreLoading ? 'opacity-50 cursor-not-allowed' : 'hover-micro-lift group/load'}`}
                  >
                    <span className="inline-block transition-transform duration-300 group-hover/load:scale-110 group-hover/load:text-sky-700">{isLoadMoreLoading ? 'Loading Matrix...' : 'Load Deep Archive'}</span>
                  </button>
                </div>
              )}
            </div>
          </div>

          {calcOpen && (
            isCalcMinimized ? (
              <button onClick={() => setIsCalcMinimized(false)} className="active-press fixed bottom-8 right-8 z-50 bg-white/90 backdrop-blur-md border border-slate-200 rounded-2xl w-16 h-16 shadow-[0_12px_30px_rgb(15,23,42,0.1)] flex items-center justify-center hover-micro-lift group/min text-slate-600 font-mono text-xs font-bold tracking-widest">
                <span className="transition-transform duration-300 group-hover/min:scale-110 group-hover/min:text-sky-600">CALC</span>
              </button>
            ) : (
              <div className="fixed bottom-8 right-8 z-50 bg-white/95 backdrop-blur-2xl border border-slate-200/80 rounded-[2rem] w-[85vw] max-w-[320px] shadow-[0_30px_60px_rgb(15,23,42,0.12)] overflow-hidden transition-all duration-300 transform origin-bottom-right hover-lift">
                <div className="bg-slate-50/80 border-b border-slate-100/80 px-6 py-4 flex justify-between items-center">
                  <span className="text-[10px] font-bold text-slate-500 tracking-[0.25em] uppercase">計算機 Compute Node</span>
                  <div className="flex gap-4">
                    <button onClick={() => setIsCalcMinimized(true)} className="text-slate-400 hover:text-sky-600 text-lg transition-colors">─</button>
                    <button onClick={() => setCalcOpen(false)} className="text-slate-400 hover:text-rose-500 text-lg transition-colors">✕</button>
                  </div>
                </div>
                <div className="p-6 space-y-5">
                  <input type="text" value={calcStr} readOnly className="w-full input-neumorphic rounded-2xl p-4.5 text-right font-mono text-slate-800 outline-none text-3xl font-bold tracking-tight" />
                  <div className="grid grid-cols-4 gap-2.5">
                    {['7','8','9','/','4','5','6','*','1','2','3','-','0','.','+'].map(btn => (
                      <button key={btn} onClick={()=>setCalcStr(prev => prev + btn)} className="active-press bg-white border border-slate-200/80 rounded-xl p-3.5 text-slate-700 font-bold shadow-sm text-lg hover-micro-lift group/btn">
                         <span className="inline-block transition-transform duration-300 group-hover/btn:scale-125 group-hover/btn:text-sky-600">{btn}</span>
                      </button>
                    ))}
                    <button onClick={calcEval} className="active-press bg-slate-900 text-white rounded-xl p-3.5 font-bold shadow-[0_4px_10px_rgb(15,23,42,0.2)] text-xl hover-micro-lift group/btn border-transparent">
                         <span className="inline-block transition-transform duration-300 group-hover/btn:scale-125 group-hover/btn:text-sky-300">=</span>
                    </button>
                    <button onClick={()=>setCalcStr('')} className="active-press col-span-4 bg-slate-100/80 text-slate-500 border border-slate-200/80 rounded-xl p-3.5 text-[11px] font-bold tracking-[0.2em] transition-all uppercase shadow-sm hover-micro-lift group/btn">
                         <span className="inline-block transition-transform duration-300 group-hover/btn:scale-110 group-hover/btn:text-slate-800">清除 Clear Buffer</span>
                    </button>
                  </div>
                </div>
              </div>
            )
          )}

          {filterPanelOpen && (
            isFilterMinimized ? (
              <button onClick={() => setIsFilterMinimized(false)} className="active-press fixed bottom-8 left-8 z-50 bg-white/90 backdrop-blur-md border border-slate-200 rounded-2xl w-16 h-16 shadow-[0_12px_30px_rgb(15,23,42,0.1)] flex items-center justify-center hover-micro-lift group/min text-slate-600 font-mono text-xs font-bold tracking-widest">
                <span className="transition-transform duration-300 group-hover/min:scale-110 group-hover/min:text-sky-600">FLTR</span>
              </button>
            ) : (
              <div className="fixed bottom-8 left-8 z-50 bg-white/95 backdrop-blur-2xl border border-slate-200/80 rounded-[2rem] w-[85vw] max-w-[320px] shadow-[0_30px_60px_rgb(15,23,42,0.12)] overflow-hidden transition-all duration-300 transform origin-bottom-left hover-lift">
                <div className="bg-slate-50/80 border-b border-slate-100/80 px-6 py-4 flex justify-between items-center">
                  <span className="text-[10px] font-bold text-slate-500 tracking-[0.25em] uppercase">空間濾鏡 Temporal Filter</span>
                  <div className="flex gap-4">
                    <button onClick={() => setIsFilterMinimized(true)} className="text-slate-400 hover:text-sky-600 text-lg transition-colors">─</button>
                    <button onClick={() => setFilterPanelOpen(false)} className="text-slate-400 hover:text-rose-500 text-lg transition-colors">✕</button>
                  </div>
                </div>
                <div className="p-6 space-y-6">
                  <div>
                    <label className="text-[10px] font-bold text-slate-400 mb-2 block tracking-[0.2em] uppercase">起始點 Start Point</label>
                    <input type="date" value={filterDates.start} onChange={e=>setFilterDates({...filterDates, start: e.target.value})} className="w-full input-neumorphic rounded-xl p-3.5 text-sm font-mono text-slate-700 outline-none" />
                  </div>
                  <div>
                    <label className="text-[10px] font-bold text-slate-400 mb-2 block tracking-[0.2em] uppercase">結束點 End Point</label>
                    <input type="date" value={filterDates.end} onChange={e=>setFilterDates({...filterDates, end: e.target.value})} className="w-full input-neumorphic rounded-xl p-3.5 text-sm font-mono text-slate-700 outline-none" />
                  </div>
                  <div className="flex gap-3 pt-3">
                    <button onClick={executeFilter} className="active-press flex-1 bg-slate-900 text-white text-[11px] font-bold tracking-[0.2em] rounded-xl py-3.5 shadow-[0_4px_12px_rgb(15,23,42,0.2)] uppercase hover-micro-lift group/btn border-transparent">
                        <span className="inline-block transition-transform duration-300 group-hover/btn:scale-110 group-hover/btn:text-sky-300">檢索 Scan</span>
                    </button>
                    {isFiltering && (
                      <button onClick={clearFilter} className="active-press flex-1 bg-white text-rose-500 border border-rose-200 text-[11px] font-bold tracking-[0.2em] rounded-xl py-3.5 shadow-sm uppercase hover-micro-lift group/btn">
                        <span className="inline-block transition-transform duration-300 group-hover/btn:scale-110">重置 Reset</span>
                      </button>
                    )}
                  </div>
                </div>
              </div>
            )
          )}

          {editModal.isOpen && editModal.data && (
            <div className="fixed inset-0 z-[8000] bg-slate-900/30 backdrop-blur-md flex items-center justify-center p-4">
              <form onSubmit={handleEditSubmit} className="bg-white/95 backdrop-blur-xl rounded-[2rem] p-8 md:p-10 max-w-lg w-full shadow-[0_30px_60px_rgb(15,23,42,0.15)] space-y-7 relative border border-slate-100 hover-lift group/mod">
                <div className="flex justify-between items-start pb-5 border-b border-slate-100">
                  <h2 className="text-xl font-bold text-slate-800 tracking-wider transition-transform duration-300 origin-left group-hover/mod:scale-105">EDIT RECORD</h2>
                  <button type="button" onClick={()=>setEditModal({isOpen:false, data:null})} className="text-slate-400 hover:text-slate-800 transition-colors w-8 h-8 flex items-center justify-center bg-slate-50 hover:bg-slate-100 rounded-full">✕</button>
                </div>

                <div className="space-y-5">
                  <div>
                    <label className="text-[10px] font-bold text-slate-400 block mb-2 tracking-[0.2em] uppercase">Date</label>
                    <input type="date" value={editModal.data.date} onChange={e=>setEditModal({isOpen:true, data:{...editModal.data, date:e.target.value}})} className="w-full input-neumorphic rounded-xl p-3.5 text-sm text-slate-700 font-mono outline-none" />
                  </div>
                  <div>
                    <label className="text-[10px] font-bold text-slate-400 block mb-2 tracking-[0.2em] uppercase">Item</label>
                    <input type="text" value={editModal.data.item} onChange={e=>setEditModal({isOpen:true, data:{...editModal.data, item:e.target.value}})} className="w-full input-neumorphic rounded-xl p-4 text-base text-slate-800 font-medium outline-none" />
                  </div>
                  <div>
                    <label className="text-[10px] font-bold text-slate-400 block mb-2 tracking-[0.2em] uppercase">Amount</label>
                    <input type="number" value={editModal.data.amount} onChange={e=>setEditModal({isOpen:true, data:{...editModal.data, amount:parseFloat(e.target.value)}})} className="w-full input-neumorphic rounded-xl p-4 text-2xl font-bold text-slate-900 font-mono outline-none" />
                  </div>
                </div>

                <div className="flex gap-4 pt-6 border-t border-slate-50">
                  <button type="submit" className="active-press flex-1 bg-slate-900 text-white text-xs font-bold tracking-widest rounded-xl py-4.5 shadow-[0_8px_20px_rgb(15,23,42,0.2)] uppercase hover-micro-lift group/btn border-transparent">
                      <span className="inline-block transition-transform duration-300 group-hover/btn:scale-105 group-hover/btn:text-sky-300">Update Matrix</span>
                  </button>
                  <button type="button" onClick={(e)=>deleteRecord(editModal.data.id, e)} className="active-press px-8 bg-white text-rose-500 text-xs font-bold tracking-widest rounded-xl py-4.5 border border-rose-200 uppercase shadow-sm hover-micro-lift group/btn">
                      <span className="inline-block transition-transform duration-300 group-hover/btn:scale-110">Erase</span>
                  </button>
                </div>
              </form>
            </div>
          )}

          {alertData && (
            <div className="fixed inset-0 z-[9999] bg-slate-900/50 backdrop-blur-md flex items-center justify-center p-4">
              <div className="bg-white/95 backdrop-blur-xl rounded-[2rem] p-10 max-w-sm w-full text-center shadow-[0_30px_60px_rgb(0,0,0,0.2)] border border-slate-100/50 hover-lift group/alert">
                <div className="w-20 h-20 bg-rose-50 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner border border-rose-100/50 transition-transform duration-300 group-hover/alert:scale-110">
                  <span className="text-4xl">⚠️</span>
                </div>
                <h2 className="text-xs font-bold text-slate-400 mb-2 tracking-[0.2em] uppercase transition-transform duration-300 group-hover/alert:scale-105">{alertData.enTitle}</h2>
                <h3 className="text-xl font-bold text-slate-800 mb-4 transition-transform duration-300 group-hover/alert:scale-105">{alertData.title}</h3>
                <p className="text-sm text-slate-500 mb-8 font-medium leading-relaxed">{alertData.desc}</p>
                <button onClick={()=>setAlertData(null)} className="active-press w-full bg-slate-900 text-white text-[11px] font-bold tracking-widest rounded-xl py-4 shadow-[0_8px_20px_rgb(15,23,42,0.2)] uppercase hover-micro-lift group/btn border-transparent">
                    <span className="inline-block transition-transform duration-300 group-hover/btn:scale-110 group-hover/btn:text-sky-300">Acknowledge</span>
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
